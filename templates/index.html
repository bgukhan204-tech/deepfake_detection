<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detective - Premium Analysis</title>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="app-container">
        <!-- Header Section -->
        <header class="header">
            <h1 class="gradient-text">Deepfake Detective</h1>
            <p class="subtitle">State-of-the-Art Deep Learning Image Analysis</p>
        </header>

        <!-- Main Upload Section -->
        <main class="main-content">
            <div class="upload-card glow-effect" id="drop-zone">
                <input type="file" id="file-input" accept="image/jpeg, image/png, image/jpg" hidden>

                <div class="upload-content" id="upload-prompt">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 16V8M12 8L9 11M12 8L15 11M4 16C4 17.1046 4.89543 18 6 18H18C19.1046 18 20 17.1046 20 16"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <h3>Drag & Drop</h3>
                    <p>or <span class="highlight">browse</span> to upload an image</p>
                </div>

                <div class="preview-container hidden" id="preview-container">
                    <div class="preview-header">
                        <span class="preview-title">Selected Image</span>
                        <span id="file-name-display" class="file-name"></span>
                    </div>
                    <img id="image-preview" src="" alt="">

                    <div class="preview-actions">
                        <button class="btn secondary glass-btn pulse" id="change-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                            </svg> Change Image
                        </button>
                        <button class="btn primary glow-btn" id="analyze-btn">Analyze Now</button>
                    </div>
                </div>
            </div>

            <!-- Global Loading Overlay / Indicator -->
            <div class="loading-overlay hidden" id="loading-spinner">
                <div class="scanner"></div>
                <p>Analyzing pixels...</p>
            </div>

            <!-- Results Section -->
            <div class="results-card hidden bounce-in" id="results-card">
                <h2 id="result-status">Analyzing...</h2>

                <div class="confidence-meters">
                    <div class="meter-wrapper">
                        <div class="meter-label">Authentic</div>
                        <div class="meter-track">
                            <div class="meter-fill success-bg" id="real-meter"></div>
                        </div>
                        <span class="confidence-text" id="real-text">0%</span>
                    </div>

                    <div class="meter-wrapper mt-3">
                        <div class="meter-label">Manipulated</div>
                        <div class="meter-track">
                            <div class="meter-fill danger-bg" id="fake-meter"></div>
                        </div>
                        <span class="confidence-text" id="fake-text">0%</span>
                    </div>
                </div>

                <div id="face-warning-container"></div>

                <div class="action-buttons mt-4">
                    <button class="btn reset-btn" id="reset-btn">Analyze Another</button>
                    <!-- Link to Indian Cybercrime reporting portal -->
                    <a href="https://cybercrime.gov.in" target="_blank" class="btn danger-btn hidden"
                        id="report-btn">Report Cybercrime</a>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
